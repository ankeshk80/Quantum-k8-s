apiVersion: apps/v1
kind: Deployment

metadata:
  name: crashloop-demo
  labels:
    app: crashloop-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: crashloop-demo

  template:
    metadata:
      labels:
        app: crashloop-demo

    spec:
      containers:
      - name: crashloop-demo
        image: busybox
        command: ["sh", "-c", "echo 'Simulating crash'; exit 1"]